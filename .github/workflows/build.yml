name: Build RimTalk.TTS

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Source/**'
      - 'About/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Source/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: |
          dotnet build Source/RimTalk.TTS.csproj \
            -c Release \
            -p:GameVersion=1.6

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RimTalk.TTS
          path: 1.6/Assemblies/
          compression-level: 0
